  .pill-pub { background: #EAF3DE; color: #27500A; }
  .pill-rev { background: #FAEEDA; color: #BA7517; }
  .chevron { font-size: 14px; color: #aaa; transition: transform 0.2s; }

  .cat-body { background: #fff; border: 0.5px solid #E8E8E8; border-top: none; border-radius: 0 0 10px 10px; overflow: hidden; }

  .sub-body { padding: 0 16px 10px; }
  .prop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 6px; margin-top: 8px; }
  .prop-tag { font-size: 11px; padding: 4px 10px; border-radius: 6px; display: flex; align-items: center; gap: 5px; }

let openCats = {hotel:true, casa:true, estancia:true};
let openSubs = {};
 
function filterByDept(arr, dept) {
  if (dept === 'all') return arr;
  return arr.filter(p => p.dept === dept);
}
 
function render() {
  const dept = document.getElementById('dept-select').value;
  let totalPub = 0, totalRev = 0;
 
  cats.forEach(c => {
    const pub = filterByDept(data[c.key].pub, dept);
    const rc = filterByDept(data[c.key].rev_contenido, dept);
    const ri = filterByDept(data[c.key].rev_info, dept);
    totalPub += pub.length;
    totalRev += rc.length + ri.length;
  });
 
  document.getElementById('m-total').textContent = totalPub + totalRev;
  document.getElementById('m-pub').textContent = totalPub;
  document.getElementById('m-rev').textContent = totalRev;
 
  const container = document.getElementById('cat-container');
  container.innerHTML = '';
 
  cats.forEach(c => {
    const pub = filterByDept(data[c.key].pub, dept);
    const rc = filterByDept(data[c.key].rev_contenido, dept);
    const ri = filterByDept(data[c.key].rev_info, dept);
    const total = pub.length + rc.length + ri.length;
    if (total === 0 && dept !== 'all') return;
 
    const pA = total > 0 ? Math.round((pub.length / total) * 100) : 0;
    const pP = total > 0 ? 100 - pA : 0;
    const isOpen = openCats[c.key];
 
    const sec = document.createElement('div');
    sec.className = 'cat-section';
 
    sec.innerHTML = `
      <div class="cat-header-bar ${isOpen ? '' : 'collapsed'}" onclick="toggleCat('${c.key}')">
        <div class="cat-title">${c.icon} ${c.label}</div>
        <div class="cat-counts">
          <span class="pill pill-pub">${pub.length} publicados</span>
          <span class="pill" style="background:#E3F2FD;color:#1565C0;">${pub.filter(p=>p.video).length} 🎬</span>
          <span class="pill pill-rev">${rc.length + ri.length} en revisión</span>
          <span class="chevron ${isOpen ? 'open' : ''}">▾</span>
        </div>
      </div>
      ${isOpen ? `
      <div class="cat-body">
        <div class="bar-row">
          <div class="bar-wrap">
            ${pub.length > 0 ? `<div class="seg seg-active" style="width:${pA}%">${pA > 10 ? pub.length : ''}</div>` : ''}
            ${(rc.length+ri.length) > 0 ? `<div class="seg seg-pending" style="width:${pP}%">${pP > 10 ? rc.length+ri.length : ''}</div>` : ''}
          </div>
        </div>
 
        ${pub.length > 0 ? `
        <div class="sub-section">
          <div class="sub-header" onclick="toggleSub('${c.key}_pub')">
            <div class="sub-title">✅ Publicados (${pub.length})</div>
            <span class="chevron ${openSubs[c.key+'_pub'] !== false ? 'open' : ''}">▾</span>
          </div>
          ${openSubs[c.key+'_pub'] !== false ? `
          <div class="sub-body">
            <div class="prop-grid">${pub.map(p=> p.link 
              ? `<a href="${p.link}" target="_blank" class="prop-tag prop-pub" style="text-decoration:none;">${p.video ? '🎬' : '📷'} ${p.name}${dept==='all'?` <span style="font-size:10px;opacity:0.7;">· ${p.dept}</span>`:''}</a>`
              : `<div class="prop-tag prop-pub" style="opacity:0.7;">${p.video ? '🎬' : '📷'} ${p.name}${dept==='all'?` <span style="font-size:10px;opacity:0.7;">· ${p.dept}</span>`:''}</div>`
            ).join('')}</div>
          </div>` : ''}
        </div>` : ''}
 
        ${rc.length > 0 ? `
        <div class="sub-section">
          <div class="sub-header" onclick="toggleSub('${c.key}_rc')">
            <div class="sub-title">📸 Pendientes de contenido (${rc.length})</div>
            <span class="chevron ${openSubs[c.key+'_rc'] !== false ? 'open' : ''}">▾</span>
          </div>
          ${openSubs[c.key+'_rc'] !== false ? `
          <div class="sub-body">
            <div class="prop-grid">${rc.map(p=>`<div class="prop-tag prop-cont">⏳ ${p.name}${dept==='all'?` <span style="font-size:10px;opacity:0.7;">· ${p.dept}</span>`:''}</div>`).join('')}</div>
          </div>` : ''}
        </div>` : ''}
 
        ${ri.length > 0 ? `
        <div class="sub-section">
          <div class="sub-header" onclick="toggleSub('${c.key}_ri')">
            <div class="sub-title">📋 Pendientes de información / subir (${ri.length})</div>
            <span class="chevron ${openSubs[c.key+'_ri'] !== false ? 'open' : ''}">▾</span>
          </div>
          ${openSubs[c.key+'_ri'] !== false ? `
          <div class="sub-body">
            <div class="prop-grid">${ri.map(p=>`<div class="prop-tag prop-info">📋 ${p.name}${dept==='all'?` <span style="font-size:10px;opacity:0.7;">· ${p.dept}</span>`:''}</div>`).join('')}</div>
          </div>` : ''}
        </div>` : ''}
 
      </div>` : ''}
    `;
    container.appendChild(sec);
  });
}
 
function toggleCat(key) {
  openCats[key] = !openCats[key];
  render();
}
 
function toggleSub(key) {
  openSubs[key] = openSubs[key] === false ? true : false;
  render();
}
 
render();
</script>
